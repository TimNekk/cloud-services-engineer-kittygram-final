name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Select the Terraform action'
        type: choice
        required: true
        default: 'plan'
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_cloud_id: ${{ secrets.CLOUD_ID }}
      TF_VAR_folder_id: ${{ secrets.FOLDER_ID }}
      TF_VAR_ssh_key: ${{ secrets.SSH_PUB_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
      
      - name: Write authorized_key.json
        working-directory: ./infra
        run: |
          echo "${{ secrets.AUTHORIZED_KEY }}" > authorized_key.json
      
      - name: Terraform Init
        working-directory: ./infra
        run: terraform init -input=false
      
      - name: Terraform Validate
        working-directory: ./infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./infra
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        run: terraform plan -input=false -out=plan.tfplan
      
      - name: Terraform Apply
        working-directory: ./infra
        if: github.event.inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve plan.tfplan
      
      - name: Terraform Destroy
        working-directory: ./infra
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -input=false -auto-approve
      
      - name: Cleanup key file
        if: always()
        working-directory: ./infra
        run: rm -f authorized_key.json