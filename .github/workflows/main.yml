name: Kittygram CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    tests:
        name: Run linter and frontend tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.9"

            - name: Install Python dependencies
              run: |
                  python -m pip install --upgrade pip 
                  pip install flake8==6.0.0 flake8-isort==6.0.0
                  pip install -r ./backend/requirements.txt

            - name: Run Python linter (flake8)
              run: |
                  python -m flake8 backend/ --exclude=kittygram_backend --max-line-length=100
                  cd backend/
                  python manage.py test

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "18"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install Node dependencies
              run: |
                  cd frontend
                  npm ci

            - name: Run frontend tests
              run: |
                  cd frontend
                  npm test -- --coverage --watchAll=false

    build_and_push_docker_images:
        name: Push docker images to DockerHub
        runs-on: ubuntu-latest
        needs: tests
        if: github.ref == 'refs/heads/main'
        steps:
            - name: Check out the repo
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}
                  registry: https://index.docker.io/v1/

            - name: Push backend to DockerHub
              uses: docker/build-push-action@v7
              with:
                  context: ./backend/
                  push: true
                  tags: timnekk/kittygram_backend:latest

            - name: Push frontend to DockerHub
              uses: docker/build-push-action@v7
              with:
                  context: ./frontend/
                  push: true
                  tags: timnekk/kittygram_frontend:latest

            - name: Push gateway to DockerHub
              uses: docker/build-push-action@v7
              with:
                  context: ./nginx/
                  push: true
                  tags: timnekk/kittygram_gateway:latest

    deploy:
        name: Deploy to server
        runs-on: ubuntu-latest
        needs: build_and_push_docker_images
        if: github.ref == 'refs/heads/main'

        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

        steps:
            - name: Checkout repo
              uses: actions/checkout@v6

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v4

            - name: Terraform Init
              working-directory: ./infra
              run: terraform init -input=false
            
            - name: Get server credentials
              id: get_server_credentials
              working-directory: ./infra
              run: |
                  echo "ip=$(terraform output -raw vm_1_public_ip)" >> $GITHUB_OUTPUT &&
                  echo "username=$(terraform output -raw vm_1_username)" >> $GITHUB_OUTPUT &&

            - name: Copy docker-compose.production.yml to server
              uses: appleboy/scp-action@master
              with:
                  host: ${{ steps.get_server_credentials.outputs.ip }}
                  username: ${{ steps.get_server_credentials.outputs.username }}
                  key: ${{ secrets.SSH_KEY }}
                  source: "docker-compose.production.yml"
                  target: "kittygram"

            - name: Execute remote commands
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ steps.get_server_credentials.outputs.ip }}
                  username: ${{ steps.get_server_credentials.outputs.username }}
                  key: ${{ secrets.SSH_KEY }}
                  script: |
                      cd kittygram
                      echo "${{ secrets.ENV_FILE }}" > .env
                      sudo docker compose -f docker-compose.production.yml pull
                      sudo docker compose -f docker-compose.production.yml down
                      sudo docker compose -f docker-compose.production.yml up -d
                      sudo docker system prune -af

    send_message:
        name: Send Telegram notification
        runs-on: ubuntu-latest
        needs:
            - deploy
        if: github.ref == 'refs/heads/main'
        steps:
            - name: Send message
              uses: appleboy/telegram-action@master
              with:
                  to: ${{ secrets.TELEGRAM_TO }}
                  token: ${{ secrets.TELEGRAM_TOKEN }}
                  message: |
                      Деплой успешно выполнен!
                      Автор: ${{ github.actor }}
                      Сообщение коммита: ${{ github.event.commits[0].message }}
                      Ссылка на коммит: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
